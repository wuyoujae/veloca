name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            electron_arch: x64
          - os: windows-latest
            target: win
            electron_arch: x64
          - os: macos-latest
            target: mac
            electron_arch: arm64
          - os: macos-latest
            target: mac
            electron_arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - if: matrix.target == 'mac'
        run: npx electron-builder --${{ matrix.target }} --${{ matrix.electron_arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - if: matrix.target == 'win'
        run: npx electron-builder --win --x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - if: matrix.target == 'linux'
        run: npx electron-builder --linux --x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: Veloca-${{ matrix.target }}-${{ matrix.electron_arch }}
          path: release/*
          if-no-files-found: ignore

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - run: ls -la artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          draft: true
          generate_release_notes: true
