name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            package_target: AppImage
            arch: x64
          - os: windows-latest
            target: win
            package_target: zip
            arch: x64
          - os: macos-15
            target: mac
            package_target: dmg zip
            arch: arm64
          - os: macos-15-intel
            target: mac
            package_target: dmg zip
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python-is-python3 libfuse2 fakeroot dpkg-dev

      - run: npm ci

      - run: npm run build

      - run: npx electron-builder --${{ matrix.target }} ${{ matrix.package_target }} --${{ matrix.arch }} --publish never
        env:
          DEBUG: electron-builder

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Veloca-${{ matrix.target }}-${{ matrix.arch }}
          path: release/*
          if-no-files-found: ignore

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          draft: true
          generate_release_notes: true
